<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Récupération de compte | BÉNIN BOOST</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #006363;
            --accent: #D16B00;
            --dark: #002b2b;
            --light: #F8FAFA;
            --white: #ffffff;
            --error: #e74c3c;
            --success: #2ecc71;
            --shadow: 0 15px 35px rgba(0,0,0,0.1);
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--light); color: var(--dark); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }

        .auth-card { width: 100%; max-width: 450px; background: var(--white); padding: 40px; border-radius: 24px; box-shadow: var(--shadow); text-align: center; }
        
        .icon-circle { width: 70px; height: 70px; background: rgba(0, 99, 99, 0.1); color: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 1.8rem; }
        
        h1 { font-size: 1.6rem; font-weight: 800; color: var(--dark); margin-bottom: 10px; }
        p { color: #64748b; font-size: 0.95rem; margin-bottom: 30px; line-height: 1.5; }

        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 700; font-size: 0.85rem; color: var(--primary); }
        .form-group input {
            width: 100%; padding: 14px; border: 1px solid #e2e8f0; border-radius: 12px; font-family: inherit; transition: var(--transition);
        }
        .form-group input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(0, 99, 99, 0.1); }

        .btn {
            width: 100%; padding: 16px; border-radius: 12px; font-weight: 800; border: none; cursor: pointer; transition: var(--transition); font-family: inherit; font-size: 1rem;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .back-link { display: block; margin-top: 25px; color: var(--primary); text-decoration: none; font-weight: 700; font-size: 0.9rem; }
        
        #statusBox { padding: 15px; border-radius: 12px; margin-bottom: 20px; display: none; font-size: 0.85rem; font-weight: 600; }
        .status-error { background: #fdeaea; color: var(--error); border: 1px solid #f9d6d6; }
        .status-success { background: #eafaf1; color: var(--success); border: 1px solid #d5f5e3; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="auth-card">
        <div id="stepRequest">
            <div class="icon-circle"><i class="fas fa-unlock-alt"></i></div>
            <h1>Mot de passe oublié ?</h1>
            <p>Entrez votre email pour recevoir un lien de réinitialisation sécurisé.</p>
            
            <div id="statusBox"></div>

            <form id="resetRequestForm">
                <div class="form-group">
                    <label>Votre adresse email</label>
                    <input type="email" id="resetEmail" placeholder="votre@email.com" required>
                </div>
                <button type="submit" class="btn btn-primary" id="btnRequest">Envoyer le lien</button>
            </form>
        </div>

        <div id="stepConfirm" class="hidden">
            <div class="icon-circle"><i class="fas fa-key"></i></div>
            <h1>Nouveau mot de passe</h1>
            <p>Créez un mot de passe robuste pour protéger votre compte.</p>
            
            <form id="newPasswordForm">
                <div class="form-group">
                    <label>Nouveau mot de passe</label>
                    <input type="password" id="newPass" placeholder="Min 6 caractères" required>
                </div>
                <div class="form-group">
                    <label>Confirmer le mot de passe</label>
                    <input type="password" id="confirmNewPass" placeholder="Confirmez" required>
                </div>
                <button type="submit" class="btn btn-primary" id="btnConfirm">Changer le mot de passe</button>
            </form>
        </div>

        <a href="login.html" class="back-link"><i class="fas fa-arrow-left"></i> Retour à la connexion</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, sendPasswordResetEmail, confirmPasswordReset } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCNukJT0_Z478WyPUVQch9AJ2-0BU1FdWk",
            authDomain: "benin-boost-digital-service.firebaseapp.com",
            projectId: "benin-boost-digital-service",
            storageBucket: "benin-boost-digital-service.firebasestorage.app",
            messagingSenderId: "1000135726407",
            appId: "1:1000135726407:web:9a8b71be4478374d5ee862",
            measurementId: "G-Q2RZXZHW7C"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const statusBox = document.getElementById('statusBox');
        const urlParams = new URLSearchParams(window.location.search);
        const oobCode = urlParams.get('oobCode'); // Le code envoyé par Firebase dans l'email

        // Afficher le bon formulaire selon l'URL
        if (oobCode) {
            document.getElementById('stepRequest').classList.add('hidden');
            document.getElementById('stepConfirm').classList.remove('hidden');
        }

        function showStatus(text, type) {
            statusBox.textContent = text;
            statusBox.className = type === 'error' ? 'status-error' : 'status-success';
            statusBox.style.display = 'block';
        }

        // --- ENVOI DU LIEN ---
        document.getElementById('resetRequestForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('resetEmail').value;
            const btn = document.getElementById('btnRequest');

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Envoi...';

            try {
                await sendPasswordResetEmail(auth, email);
                showStatus("✅ Un lien a été envoyé ! Vérifiez vos spams si besoin.", "success");
                btn.innerHTML = "Lien envoyé";
            } catch (error) {
                showStatus("Erreur : Compte introuvable ou email invalide.", "error");
                btn.disabled = false;
                btn.innerHTML = "Envoyer le lien";
            }
        });

        // --- VALIDATION DU NOUVEAU MOT DE PASSE ---
        document.getElementById('newPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPass = document.getElementById('newPass').value;
            const confirmPass = document.getElementById('confirmNewPass').value;
            const btn = document.getElementById('btnConfirm');

            if (newPass.length < 6) return alert("Le mot de passe doit faire au moins 6 caractères.");
            if (newPass !== confirmPass) return alert("Les mots de passe ne correspondent pas.");

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Modification...';

            try {
                await confirmPasswordReset(auth, oobCode, newPass);
                alert("✨ Succès ! Votre mot de passe a été modifié.");
                window.location.href = "login.html";
            } catch (error) {
                alert("Le lien est expiré ou invalide. Veuillez recommencer la demande.");
                window.location.href = "forgot-password.html";
            }
        });
    </script>
</body>
</html>
