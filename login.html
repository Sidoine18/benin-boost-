<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | BÉNIN BOOST DIGITAL SERVICE</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #006363;
            --accent: #D16B00;
            --dark: #002b2b;
            --light: #F8FAFA;
            --white: #ffffff;
            --error: #e74c3c;
            --warning: #f39c12;
            --shadow: 0 15px 35px rgba(0,0,0,0.1);
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--light); color: var(--dark); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }

        .auth-container { width: 100%; max-width: 450px; background: var(--white); padding: 40px; border-radius: 24px; box-shadow: var(--shadow); }
        .logo-box { text-align: center; margin-bottom: 30px; }
        .logo-box img { height: 60px; margin-bottom: 15px; }
        .logo-box h1 { font-size: 1.5rem; font-weight: 800; color: var(--primary); }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 700; font-size: 0.9rem; }
        .form-group input {
            width: 100%; padding: 14px; border: 1px solid #e2e8f0; border-radius: 12px; font-family: inherit; transition: var(--transition);
        }
        .form-group input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(0, 99, 99, 0.1); }

        .btn {
            width: 100%; padding: 16px; border-radius: 12px; font-weight: 800; border: none; cursor: pointer; transition: var(--transition); font-family: inherit; font-size: 1rem;
        }
        .btn-primary { background: var(--primary); color: white; margin-top: 10px; }
        .btn-google { background: white; border: 1px solid #e2e8f0; color: var(--dark); margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .footer-link { text-align: center; margin-top: 25px; font-size: 0.9rem; }
        .footer-link a { color: var(--primary); text-decoration: none; font-weight: 700; }

        /* Alertes de sécurité */
        #alertBox { padding: 15px; border-radius: 12px; margin-bottom: 20px; display: none; font-size: 0.85rem; font-weight: 600; line-height: 1.4; }
        .alert-error { background: #fdeaea; color: var(--error); border: 1px solid #f9d6d6; }
        .alert-warning { background: #fff9eb; color: var(--warning); border: 1px solid #ffeeba; }
        .alert-success { background: #eafaf1; color: #2ecc71; border: 1px solid #d5f5e3; }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="logo-box">
            <img src="benin-boost.jpg" alt="Logo">
            <h1>BÉNIN BOOST</h1>
            <p style="color: #64748b; font-size: 0.9rem; margin-top: 5px;">Accédez à votre espace membre</p>
        </div>

        <div id="alertBox"></div>

        <form id="loginForm">
            <div class="form-group">
                <label>Adresse Email</label>
                <input type="email" id="loginEmail" placeholder="votre@email.com" required>
            </div>
            
            <div class="form-group">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <label>Mot de passe</label>
                    <a href="forgot-password.html" style="font-size: 0.75rem; color: var(--primary); text-decoration: none; font-weight: 600;">Oublié ?</a>
                </div>
                <input type="password" id="loginPass" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary" id="btnLogin">Se connecter</button>
        </form>

        <button class="btn btn-google" id="btnGoogleLogin">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="20">
            Connexion avec Google
        </button>

        <p class="footer-link">Nouveau ici ? <a href="signup.html">Créer un compte</a></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCNukJT0_Z478WyPUVQch9AJ2-0BU1FdWk",
            authDomain: "benin-boost-digital-service.firebaseapp.com",
            projectId: "benin-boost-digital-service",
            storageBucket: "benin-boost-digital-service.firebasestorage.app",
            messagingSenderId: "1000135726407",
            appId: "1:1000135726407:web:9a8b71be4478374d5ee862",
            measurementId: "G-Q2RZXZHW7C"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const alertBox = document.getElementById('alertBox');
        const btnLogin = document.getElementById('btnLogin');

        function showAlert(text, type) {
            alertBox.textContent = text;
            alertBox.className = `alert-${type}`;
            alertBox.style.display = 'block';
        }

        // --- LOGIQUE DE CONNEXION ---
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;

            btnLogin.disabled = true;
            btnLogin.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Vérification...';
            alertBox.style.display = 'none';

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;

                // 1. VÉRIFICATION EMAIL
                if (!user.emailVerified) {
                    showAlert("📧 Votre email n'est pas vérifié. Veuillez consulter votre boîte de réception.", "warning");
                    await signOut(auth); // On déconnecte car non vérifié
                    btnLogin.disabled = false;
                    btnLogin.innerHTML = "Se connecter";
                    return;
                }

                // 2. VÉRIFICATION STATUT DANS FIRESTORE
                const userDoc = await getDoc(doc(db, "users", user.uid));
                
                if (userDoc.exists()) {
                    const userData = userDoc.data();
                    
                    if (userData.role === "responsable" && userData.status === "pending") {
                        showAlert("⏳ Votre compte Responsable est en attente de validation par l'équipe BÉNIN BOOST.", "warning");
                        await signOut(auth);
                        btnLogin.disabled = false;
                        btnLogin.innerHTML = "Se connecter";
                    } else {
                        // Succès total
                        showAlert("Connexion réussie ! Redirection...", "success");
                        setTimeout(() => window.location.href = "formations.html", 1500);
                    }
                }

            } catch (error) {
                showAlert("Erreur : Email ou mot de passe incorrect.", "error");
                btnLogin.disabled = false;
                btnLogin.innerHTML = "Se connecter";
            }
        });

        // --- CONNEXION GOOGLE ---
        document.getElementById('btnGoogleLogin').addEventListener('click', async () => {
            const provider = new GoogleAuthProvider();
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                
                // On vérifie le statut même pour Google (au cas où un responsable s'est inscrit via Google)
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists() && userDoc.data().status === "pending") {
                    showAlert("⏳ Votre compte est en attente de validation.", "warning");
                    await signOut(auth);
                } else {
                    window.location.href = "formations.html";
                }
            } catch (error) {
                showAlert("Erreur de connexion Google.", "error");
            }
        });
    </script>
</body>
</html>
